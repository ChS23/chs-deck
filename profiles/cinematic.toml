# ─── Profile: cinematic ───────────────────────────────────────────────────────
# Видео бесшовно на всех 15 кнопках (5×3, слот 0..14).
# layer nav перекрывает слоты 15 и 16 кнопками переключения профиля.
# Col 5 (display) остаётся пустой — там нет кнопок.
#
#   COL  0      1      2      3      4    │  5
#  ┌──────┬──────┬──────┬──────┬──────────┼────────────┐
#  │      │      │      │      │          │            │  ROW 0
#  │      │    В И Д Е О   5×3            │            │
#  │      │      │      │      │          │            │  ROW 1
#  │      │      │      │  [15]│   [16]   │            │  ROW 2
#  └──────┴──────┴──────┴──────┴──────────┴────────────┘
#                             ▲──── nav layer ──────▲

name              = "cinematic"

# nav всегда поверх — перекрывает слоты 15/16 из [[slot]] ниже
layers = ["nav", "display"]

# Укажи свой видеофайл:
video_path  = "/home/chs/Загрузки/sung-jin-woo-vs-architect-solo-leveling-moewalls-com.mp4"

