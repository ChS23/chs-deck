<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <style>
    body { background: #2d2d2d; color: #fff; font-family: system-ui, sans-serif; padding: 12px; font-size: 13px; margin: 0; }
    label { display: block; margin-bottom: 6px; color: #aaa; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
    select {
      width: 100%; padding: 7px 8px; background: #1a1a1a; color: #fff;
      border: 1px solid #555; border-radius: 4px; font-size: 13px; cursor: pointer;
    }
  </style>
</head>
<body>
  <label>Показывать</label>
  <select id="stat">
    <option value="cpu">CPU %</option>
    <option value="ram">RAM %</option>
    <option value="docker">🐳 Docker — контейнеры</option>
  </select>

  <script>
    function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
      const ws = new WebSocket('ws://localhost:' + inPort);
      const actionInfo = JSON.parse(inActionInfo);
      const settings = actionInfo.payload.settings || {};

      document.getElementById('stat').value = settings.stat || 'cpu';

      ws.onopen = () => {
        ws.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
      };

      document.getElementById('stat').addEventListener('change', (e) => {
        settings.stat = e.target.value;
        ws.send(JSON.stringify({ event: 'setSettings', context: inUUID, payload: settings }));
      });
    }
  </script>
</body>
</html>
