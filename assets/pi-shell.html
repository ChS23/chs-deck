<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <style>
    body { background: #2d2d2d; color: #fff; font-family: system-ui, sans-serif; padding: 12px; font-size: 13px; margin: 0; }
    label { display: block; margin-bottom: 6px; color: #aaa; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
    textarea {
      width: 100%; height: 80px; padding: 7px 8px; background: #1a1a1a; color: #4ade80;
      border: 1px solid #555; border-radius: 4px; font-size: 12px; font-family: monospace;
      resize: vertical; box-sizing: border-box;
    }
  </style>
</head>
<body>
  <label>Команда (shell)</label>
  <textarea id="cmd" placeholder="pkill nekoray; sudo hiddify &amp;"></textarea>

  <script>
    function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
      const ws = new WebSocket('ws://localhost:' + inPort);
      const actionInfo = JSON.parse(inActionInfo);
      const settings = actionInfo.payload.settings || {};

      document.getElementById('cmd').value = settings.cmd || '';

      ws.onopen = () => ws.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));

      document.getElementById('cmd').addEventListener('input', (e) => {
        settings.cmd = e.target.value;
        ws.send(JSON.stringify({ event: 'setSettings', context: inUUID, payload: settings }));
      });
    }
  </script>
</body>
</html>
