<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <style>
    body { background: #2d2d2d; color: #fff; font-family: system-ui, sans-serif; padding: 12px; font-size: 13px; margin: 0; }
    label { display: block; margin-bottom: 6px; color: #aaa; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
    input {
      width: 100%; padding: 7px 8px; background: #1a1a1a; color: #c4b5fd;
      border: 1px solid #555; border-radius: 4px; font-size: 12px;
      box-sizing: border-box; margin-bottom: 10px;
    }
    .row { display: flex; gap: 6px; }
    .row > div { flex: 1; }
    button {
      width: 100%; padding: 8px; background: #7c3aed; color: #fff; border: none;
      border-radius: 4px; font-size: 13px; cursor: pointer; margin-top: 4px;
    }
    button:hover { background: #6d28d9; }
    #status { font-size: 11px; color: #4ade80; margin-top: 6px; min-height: 14px; }
  </style>
</head>
<body>
  <label>Video path or URL</label>
  <input id="path" type="text" placeholder="/home/user/video.mp4 or https://...">

  <div class="row">
    <div><label>FPS</label><input id="fps" type="number" min="1" max="30" value="10"></div>
    <div><label>Gap X</label><input id="gap_x" type="number" min="0" max="100" value="0"></div>
    <div><label>Gap Y</label><input id="gap_y" type="number" min="0" max="100" value="0"></div>
  </div>

  <button id="apply">Apply</button>
  <div id="status"></div>

  <script>
    function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
      var ws = new WebSocket('ws://localhost:' + inPort);
      var actionInfo = JSON.parse(inActionInfo);
      var settings = actionInfo.payload.settings || {};

      document.getElementById('path').value  = settings.path  || '';
      document.getElementById('fps').value   = settings.fps   || 10;
      document.getElementById('gap_x').value = settings.gap_x || 0;
      document.getElementById('gap_y').value = settings.gap_y || 0;

      ws.onopen = function() {
        ws.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
        document.getElementById('status').textContent = 'Connected';
      };

      ws.onerror = function() {
        document.getElementById('status').textContent = 'WS error';
      };

      function save() {
        settings.path  = document.getElementById('path').value;
        settings.fps   = Number(document.getElementById('fps').value);
        settings.gap_x = Number(document.getElementById('gap_x').value);
        settings.gap_y = Number(document.getElementById('gap_y').value);

        var payload = {};
        for (var k in settings) { payload[k] = settings[k]; }

        ws.send(JSON.stringify({ event: 'setSettings', context: inUUID, payload: payload }));
        ws.send(JSON.stringify({ event: 'sendToPlugin', action: actionInfo.action, context: inUUID, payload: payload }));
        document.getElementById('status').textContent = 'Sent! path=' + settings.path;
      }

      document.getElementById('apply').addEventListener('click', save);
    }
  </script>
</body>
</html>
